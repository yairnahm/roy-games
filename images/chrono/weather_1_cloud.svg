<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Soft background to make the white/blue cloud pop -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd" />
      <stop offset="100%" stop-color="#7dd3fc" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>
    <linearGradient id="cheekGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0284c7" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky Background Card -->
  <rect width="200" height="200" rx="30" fill="url(#bgGrad)" />

  <g filter="url(#shadow)" transform="translate(10, 15)">
    <!-- Main Cloud Body -->
    <!-- We compose the cloud using overlapping circles and a base path -->
    <path d="M 50,120 
             A 25,25 0 0,1 40,80 
             A 35,35 0 0,1 90,50 
             A 40,40 0 0,1 150,75 
             A 25,25 0 0,1 140,120 
             Z" fill="url(#cloudGrad)" />
    <rect x="50" y="100" width="90" height="20" fill="url(#cloudGrad)" />

    <!-- Cute Eyes -->
    <circle cx="80" cy="90" r="5" fill="#1e293b" />
    <circle cx="82" cy="88" r="1.5" fill="#ffffff" />
    
    <circle cx="110" cy="90" r="5" fill="#1e293b" />
    <circle cx="112" cy="88" r="1.5" fill="#ffffff" />

    <!-- Smiling Mouth -->
    <path d="M 91,95 Q 95,100 99,95" fill="none" stroke="#1e293b" stroke-width="3" stroke-linecap="round" />

    <!-- Cute Rosy Cheeks -->
    <ellipse cx="71" cy="95" rx="6" ry="4" fill="url(#cheekGrad)" opacity="0.8" />
    <ellipse cx="119" cy="95" rx="6" ry="4" fill="url(#cheekGrad)" opacity="0.8" />
  </g>
</svg>
