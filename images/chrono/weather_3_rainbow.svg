<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Soft sky background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd" />
      <stop offset="100%" stop-color="#7dd3fc" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f9ff" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#0284c7" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Sky Background Card -->
  <rect width="200" height="200" rx="30" fill="url(#bgGrad)" />

  <!-- Smiling Sun in the background -->
  <g transform="translate(140, 30)" filter="url(#shadow)">
    <circle cx="20" cy="20" r="22" fill="url(#sunGrad)" />
    <!-- Sun Rays -->
    <path d="M 20,-10 L 20,-4 M 20,44 L 20,50 M -10,20 L -4,20 M 44,20 L 50,20 M -1,2 L 3,6 M 37,38 L 41,42 M -1,38 L 3,34 M 37,2 L 41,6" stroke="#eab308" stroke-width="4" stroke-linecap="round" />
    <!-- Sun Face -->
    <circle cx="12" cy="16" r="2.5" fill="#1e293b" />
    <circle cx="28" cy="16" r="2.5" fill="#1e293b" />
    <path d="M 16,24 Q 20,28 24,24" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Rainbow Arcs -->
  <g filter="url(#shadow)" transform="translate(0, 10)">
    <!-- Red, Orange, Yellow, Green, Blue, Purple -->
    <path d="M 30,160 A 70,70 0 0,1 170,160" fill="none" stroke="#f43f5e" stroke-width="8" stroke-linecap="round" />
    <path d="M 38,160 A 62,62 0 0,1 162,160" fill="none" stroke="#fb923c" stroke-width="8" stroke-linecap="round" />
    <path d="M 46,160 A 54,54 0 0,1 154,160" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round" />
    <path d="M 54,160 A 46,46 0 0,1 146,160" fill="none" stroke="#4ade80" stroke-width="8" stroke-linecap="round" />
    <path d="M 62,160 A 38,38 0 0,1 138,160" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" />
    <path d="M 70,160 A 30,30 0 0,1 130,160" fill="none" stroke="#c084fc" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- Left Cloud Base -->
  <g filter="url(#shadow)" transform="translate(10, 125)">
    <path d="M 20,40 A 15,15 0 0,1 15,15 A 20,20 0 0,1 45,5 A 25,25 0 0,1 75,18 A 15,15 0 0,1 70,40 Z" fill="url(#cloudGrad)" />
  </g>

  <!-- Right Cloud Base -->
  <g filter="url(#shadow)" transform="translate(115, 125)">
    <path d="M 20,40 A 15,15 0 0,1 15,18 A 25,25 0 0,1 45,5 A 20,20 0 0,1 75,15 A 15,15 0 0,1 70,40 Z" fill="url(#cloudGrad)" />
  </g>
</svg>
