<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Soft background to make the white/blue cloud and raindrops pop -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd" />
      <stop offset="100%" stop-color="#7dd3fc" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="cheekGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0284c7" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky Background Card -->
  <rect width="200" height="200" rx="30" fill="url(#bgGrad)" />

  <!-- Raindrops falling from the cloud -->
  <g transform="translate(10, 15)">
    <!-- Drop 1 -->
    <path d="M 50,140 C 50,146 45,150 45,150 C 45,150 40,146 40,140 C 40,134 45,128 45,128 C 45,128 50,134 50,140 Z" fill="url(#dropGrad)" />
    <!-- Drop 2 -->
    <path d="M 90,150 C 90,156 85,160 85,160 C 85,160 80,156 80,150 C 80,144 85,138 85,138 C 85,138 90,144 90,150 Z" fill="url(#dropGrad)" />
    <!-- Drop 3 -->
    <path d="M 130,135 C 130,141 125,145 125,145 C 125,145 120,141 120,135 C 120,129 125,123 125,123 C 125,123 130,129 130,135 Z" fill="url(#dropGrad)" />
    <!-- Drop 4 (back row, slightly smaller) -->
    <path d="M 70,128 C 70,133 66,136 66,136 C 66,136 62,133 62,128 C 62,123 66,118 66,118 C 66,118 70,123 70,128 Z" fill="url(#dropGrad)" opacity="0.7" />
    <path d="M 110,132 C 110,137 106,140 106,140 C 106,140 102,137 102,132 C 102,127 106,122 106,122 C 106,122 110,127 110,132 Z" fill="url(#dropGrad)" opacity="0.7" />
  </g>

  <!-- Cloud on top of rain -->
  <g filter="url(#shadow)" transform="translate(10, 5)">
    <!-- Main Cloud Body -->
    <path d="M 50,120 
             A 25,25 0 0,1 40,80 
             A 35,35 0 0,1 90,50 
             A 40,40 0 0,1 150,75 
             A 25,25 0 0,1 140,120 
             Z" fill="url(#cloudGrad)" />
    <rect x="50" y="100" width="90" height="20" fill="url(#cloudGrad)" />

    <!-- Cute Eyes -->
    <circle cx="80" cy="90" r="5" fill="#1e293b" />
    <circle cx="82" cy="88" r="1.5" fill="#ffffff" />
    
    <circle cx="110" cy="90" r="5" fill="#1e293b" />
    <circle cx="112" cy="88" r="1.5" fill="#ffffff" />

    <!-- Smiling Mouth -->
    <path d="M 91,95 Q 95,100 99,95" fill="none" stroke="#1e293b" stroke-width="3" stroke-linecap="round" />

    <!-- Cute Rosy Cheeks -->
    <ellipse cx="71" cy="95" rx="6" ry="4" fill="url(#cheekGrad)" opacity="0.8" />
    <ellipse cx="119" cy="95" rx="6" ry="4" fill="url(#cheekGrad)" opacity="0.8" />
  </g>
</svg>
